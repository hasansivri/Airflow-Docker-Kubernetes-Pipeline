apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-streamlit-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-streamlit-app
  template:
    metadata:
      labels:
        app: airflow-streamlit-app
    spec:
      containers:
      - name: airflow-streamlit-app
        image: hasan05/ml-airflow-streamlit-app:latest 
        ports:
        - containerPort: 8501
        volumeMounts:
        - name: airflow-storage
          mountPath: /tmp 
      volumes:
      - name: airflow-storage
        hostPath:
          path: /var/lib/airflow_data 
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-streamlit-service
spec:
  type: NodePort
  selector:
    app: airflow-streamlit-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8501
    nodePort: 30005


# sudo mkdir -p /var/lib/airflow_data && sudo chmod 777 /var/lib/airflow_data
